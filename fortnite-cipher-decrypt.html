<!DOCTYPE html>

<html lang="en">
    <header>
        <title>fortnite cipher decoder</title>
        <link rel="stylesheet" href="default_style.css">
        <meta charset="utf-8">
    </header>

    <script>
        function decrypt(encryptedMessage) {
            //store the alphabet to map decrypted characters
            const alphabet = "abcdefghijklmnopqrstuvwxyz";
            //store the cipher
            cipher = [0, 3, 1, 0, 2, 0, 2, 3];
            //initialize cipher index at 0
            cipherIndex = 0;
            //split the encrypted message into an array of integers delineated by "."
            storedChars = encryptedMessage.split(".");
            //initialize an array to store decrypted chars
            decryptedChars = [];
            //loop through stored chars
            for (var i = 0; i < storedChars.length; i++) {
                //the decrypted character will equal the stored char(converted to a number) minus the next value in the cipher
                decryptedChars[i] = Number(storedChars[i]) - cipher[cipherIndex];
                //increment the cipher index
                cipherIndex++;
                //if we've reached the end of the cipher, wrap back around
                if (cipherIndex > 7)
                    cipherIndex = 0;
                //set the value in decrypted array equal to its alphabetical equivalent
                decryptedChars[i] = alphabet[decryptedChars[i] - 1];
            }
            //output the decrypted message to the client
            document.getElementById("decryptedMessage").innerHTML = decryptedChars.join("");
        }
    </script>

    <body>
        <p class = "align-left">
            <a href = "./index.html">Back to home</a>
        </p>
        <div class = "align-left">Enter the encrypted message as numbers separated by periods (e.g. 12.24.13.26)</div>
        <input type = "text" id = eMessage> <br>
        <input type="submit" value="Decrypt" onclick = decrypt(document.getElementById("eMessage").value)> <br>
        <div id = "decryptedMessage" class = "align-left">   </div> <br>
    </body>
</html>
